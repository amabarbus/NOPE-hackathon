<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback | Business Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Leave Feedback</h1>
            <p class="text-gray-500 text-sm">Your data is protected by CyberShield Pro.</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-lg">
            <p class="text-red-700 text-sm font-medium">{{ error }}</p>
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded-r-lg">
            <p class="text-green-700 text-sm font-medium">{{ success }}</p>
        </div>
        {% endif %}

        {% if warning %}
        <div class="mb-6 p-4 bg-yellow-50 border-l-4 border-yellow-500 rounded-r-lg">
            <p class="text-yellow-700 text-sm font-medium">{{ warning }}</p>
        </div>
        {% endif %}

        <form action="/submit-comment" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Your Comment</label>
                <textarea name="comment" rows="4" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="Tell us what you think...">{{ comment if comment }}</textarea>
            </div>
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition active:scale-95">
                Post Feedback
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 flex items-center justify-center gap-2 grayscale opacity-50">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Protected by</span>
            <span class="text-xs font-black text-blue-600">CYBERSHIELD EDGE</span>
        </div>
    </div>
</body>
</html>
