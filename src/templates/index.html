<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOPE! | Protect Your Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#0B0E14] text-white min-h-screen flex items-center justify-center font-sans overflow-hidden">
    <div class="fixed inset-0 -z-10">
        <div class="absolute top-20 left-20 w-96 h-96 bg-[#b794f6] rounded-full blur-[150px] opacity-20 animate-pulse">
        </div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-[#6b8cff] rounded-full blur-[150px] opacity-20 animate-pulse"
            style="animation-delay: 1s"></div>
    </div>

    <div
        class="text-center p-10 bg-white/5 border border-white/10 rounded-3xl backdrop-blur-xl shadow-2xl max-w-lg w-full z-10">
        <div class="flex justify-center mb-6">
            <div class="p-3 rounded-2xl bg-gradient-to-br from-[#6b8cff] to-[#b794f6] shadow-lg shadow-[#b794f6]/20">
                <img src="/static/images/logo.png" alt="Logo" class="w-10 h-10 object-contain">
            </div>
        </div>
        <h1
            class="text-5xl font-bold mb-4 bg-gradient-to-r from-[#e8e9f3] via-[#b794f6] to-[#6b8cff] bg-clip-text text-transparent pb-2">
            NOPE!</h1>
        <p class="text-[#9ca3c0] mb-8 text-lg">Enterprise-grade defense for your personal website. Block hackers,
            malware, and DDoS attacks with one click.</p>

        <form action="/subscribe" method="POST">
            <button type="submit"
                class="w-full py-4 bg-gradient-to-r from-[#6b8cff] to-[#b794f6] rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform shadow-lg shadow-[#b794f6]/20 flex justify-center items-center gap-2">
                Get Protected Now <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
