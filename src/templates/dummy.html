<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">
        <h2 class="text-2xl font-bold mb-2 text-gray-800">Acme Corp HQ</h2>
        <p class="text-sm text-gray-500 mb-6">Internal Employee Portal</p>
        
        <form action="/target" method="POST" class="flex flex-col gap-4">
            <input type="text" name="username" placeholder="Employee ID or Username" class="border p-2 rounded w-full">
            <input type="password" name="password" placeholder="Password" class="border p-2 rounded w-full">
            <button type="submit" class="bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Login</button>
        </form>
    </div>
</body>
</html>
