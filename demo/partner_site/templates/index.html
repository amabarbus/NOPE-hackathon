<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Portal | Secure Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .success-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-lg w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 transition-all hover:shadow-indigo-500/5">
        
        <!-- Header -->
        <div class="p-8 pb-0 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Send Feedback</h1>
                <p class="text-slate-500 mt-1 font-medium">Help us improve our service.</p>
            </div>
            <div class="p-3 bg-indigo-50 rounded-2xl">
                <i data-lucide="message-square" class="text-indigo-600 w-6 h-6"></i>
            </div>
        </div>

        <div class="p-8 pt-6">
            <!-- Messages -->
            {% if success %}
            <div class="mb-6 p-4 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center gap-3 success-glow animate-in fade-in slide-in-from-top-2">
                <div class="p-2 bg-emerald-500 rounded-full text-white"><i data-lucide="check" class="w-4 h-4"></i></div>
                <p class="text-emerald-800 text-sm font-semibold">{{ success }}</p>
            </div>
            {% endif %}

            {% if error %}
            <div class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center gap-3 animate-in fade-in slide-in-from-top-2">
                <div class="p-2 bg-rose-500 rounded-full text-white"><i data-lucide="shield-alert" class="w-4 h-4"></i></div>
                <p class="text-rose-800 text-sm font-semibold">{{ error }}</p>
            </div>
            {% endif %}

            <form action="/submit-comment" method="POST" class="space-y-5">
                <div>
                    <label class="block text-slate-700 text-xs font-black uppercase tracking-widest mb-2">Detailed Feedback</label>
                    <textarea 
                        name="comment" 
                        rows="5" 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all placeholder:text-slate-400 font-medium"
                        placeholder="Share your thoughts with us..."></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-xl transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                    Submit Review <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="bg-slate-50 p-6 border-t border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">End-to-End Secure</span>
            </div>
            <div class="flex items-center gap-2 grayscale opacity-60">
                <span class="text-[9px] font-bold text-slate-400 uppercase">Protected by</span>
                <span class="text-[10px] font-black text-indigo-600 flex items-center gap-1">
                    <i data-lucide="shield" class="w-3 h-3"></i> NOPE! EDGE
                </span>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
